#==========================================================
# Polybar Configuration
#==========================================================

[colors]
background = #221922
background-alt = #312531
foreground = #dfdfdf
foreground-alt = #445593
primary = #389
secondary = #906
alert = #f02
trans = #00000000

[bar/mybar]
width = 100%
height = 28
radius = 10.0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
border-size = 4
border-color = ${colors.trans}

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 1

font-0 = "Hack Nerd Font:style=Medium:size=10;2"
font-1 = "Hack Nerd Font:style=Bold:size=10;2"
font-2 = "Hack Nerd Font:size=12;3"

modules-left = bspwm i3
modules-center = date
modules-right = pulseaudio sep wlan eth sep cpu memory sep temperature sep battery tray

tray-position = right
tray-padding = 2
tray-background = ${colors.background}

override-redirect = false
cursor-click = pointer
cursor-scroll = ns-resize

[module/sep]
type = custom/text
content = " | "
content-foreground = ${colors.background-alt}

[module/bspwm]
type = internal/bspwm
format = <label-state> <label-mode>
format-background = ${colors.background}

label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-padding = 2

label-occupied = %index%
label-occupied-padding = 2

label-urgent = %index%!
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %index%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 2

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
format-background = ${colors.background}
index-sort = true

label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 5
date = "%Y/%m/%d"
time = %H:%M
format = <label>
format-prefix = "󰃭 "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.background-alt}
format-padding = 2
label = "%date% | %time%"

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-background = ${colors.background}
format-padding = 1
label-volume = %percentage%%
label-muted = 󰖁 Muted
label-muted-foreground = ${colors.foreground-alt}
label-muted-padding = 1
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.primary}
click-right = pavucontrol

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.background}
format-padding = 1
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.background}
format-padding = 1
label = %percentage_used%%

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60
format = <ramp> <label>
format-background = ${colors.background}
format-padding = 1
label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}
ramp-0 = 󰔄 
ramp-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
low-at = 20
format-charging = <animation-charging> <label-charging>
format-background = ${colors.background}
format-padding = 1
format-discharging = <ramp-capacity> <label-discharging>
format-background = ${colors.background}
format-padding = 1
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.primary}
format-background = ${colors.background}
format-padding = 1
ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂
ramp-capacity-5 = 󰁹
ramp-capacity-foreground = ${colors.primary}
animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰢝
animation-charging-3 = 󰢞
animation-charging-4 = 󰂋
animation-charging-5 = 󰂄
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750

[module/wlan]
type = internal/network
interface = wlp22s0
interval = 3.0
format-connected = <ramp-signal> <label-connected>
format-connected-background = ${colors.background}
format-connected-padding = 1
label-connected = %essid% %downspeed:8%
format-disconnected = 
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
ramp-signal-foreground = ${colors.primary}

[module/eth]
type = internal/network
interface = enp20s0
interval = 3.0
format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.primary}
format-connected-background = ${colors.background}
format-connected-padding = 1
label-connected = %downspeed:8%
format-disconnected = 

[global/wm]
margin-top = 5
margin-bottom = 4
