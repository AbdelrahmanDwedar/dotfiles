#==========================================================
# Floating Grouped Polybar Configuration
#==========================================================

[colors]
background = #221922
background-alt = #312531
foreground = #dfdfdf
foreground-alt = #445593
primary = #389
secondary = #906
alert = #f02
trans = #00000000

[settings]
screenchange-reload = true
pseudo-transparency = true

#--- Base Bar Structure ---

[bar/base]
height = 28
radius = 12
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
border-size = 4
border-color = ${colors.trans}
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = "Hack Nerd Font:style=Medium:size=10;3"
font-1 = "Hack Nerd Font:style=Bold:size=10;3"
font-2 = "Hack Nerd Font:size=13;4"
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = bspwm

#--- Island Definitions ---

[bar/left]
inherit = bar/base
width = 10%
offset-x = 1%
modules-center = bspwm
override-redirect = true

[bar/center]
inherit = bar/base
width = 14%
offset-x = 43%
modules-center = date
override-redirect = true

[bar/right]
inherit = bar/base
width = 30%
offset-x = 69%
modules-center = pulseaudio wlan eth cpu memory battery tray
override-redirect = true

#--- Modules ---

[module/tray]
type = internal/tray
tray-padding = 2
tray-background = ${colors.background}

[module/bspwm]
type = internal/bspwm
format = <label-state>
format-background = ${colors.background}

label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-padding = 1
label-focused-underline = ${colors.primary}

label-occupied = %index%
label-occupied-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %index%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 5
date = "%Y/%m/%d"
time = %H:%M
format = <label>
format-prefix = "󰃭 "
format-prefix-foreground = ${colors.primary}
label = "%date% | %time%"

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = 󰖁
label-muted-foreground = ${colors.foreground-alt}
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.primary}
click-right = pavucontrol

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
low-at = 20
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.primary}
ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂
ramp-capacity-5 = 󰁹
ramp-capacity-foreground = ${colors.primary}
animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰢝
animation-charging-3 = 󰢞
animation-charging-4 = 󰂋
animation-charging-5 = 󰂄
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750

[module/wlan]
type = internal/network
interface = wlp22s0
interval = 3.0
format-connected = <ramp-signal>
label-connected = %essid%
format-disconnected = 
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
ramp-signal-foreground = ${colors.primary}

[module/eth]
type = internal/network
interface = enp20s0
interval = 3.0
format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %downspeed:8%
format-disconnected = 
