#==========================================================
# Floating Grouped Polybar Configuration
#==========================================================

[colors]
background = #221922
background-alt = #312531
foreground = #dfdfdf
foreground-alt = #445593
primary = #389
secondary = #906
alert = #f02
trans = #00000000

[settings]
screenchange-reload = true
pseudo-transparency = true

#--- Base Bar Structure ---

[bar/base]
height = 28
radius = 12
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
border-size = 4
border-color = ${colors.trans}
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = "Hack Nerd Font:style=Medium:size=10;3"
font-1 = "Hack Nerd Font:style=Bold:size=10;3"
font-2 = "Hack Nerd Font:size=13;4"
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = bspwm

#--- Island Definitions ---

[bar/left]
inherit = bar/base
width = 19%
offset-x = 1%
modules-center = bspwm
override-redirect = true

[bar/center]
inherit = bar/base
width = 14%
offset-x = 39%
modules-center = date
override-redirect = true

[bar/right]
inherit = bar/base
width = 23%
offset-x = 75%
modules-center = pulseaudio eth cpu memory battery tray
override-redirect = true

#--- Modules ---

[module/sep]
type = custom/text
format = "|"
format-foreground = ${colors.background-alt}

[module/tray]
type = internal/tray
tray-padding = 2
tray-background = ${colors.background}

[module/bspwm]
type = internal/bspwm
format = <label-state>
format-background = ${colors.background}

# Setting up 9 workspaces
ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4
ws-icon-4 = 5;5
ws-icon-5 = 6;6
ws-icon-6 = 7;7
ws-icon-7 = 8;8
ws-icon-8 = 9;9

label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-padding = 1
label-focused-underline = ${colors.primary}

label-occupied = %index%
label-occupied-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %index%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 5
date = "%Y/%m/%d"
time = %H:%M
format = <label>
format-prefix = "¾░āŁ "
format-prefix-foreground = ${colors.primary}
label = "%date% | %time%"

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = ¾░¢ü
label-muted-foreground = ${colors.foreground-alt}
ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć©
ramp-volume-foreground = ${colors.primary}
